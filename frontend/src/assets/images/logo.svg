<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1ec8c8" stroke-width="2" opacity="0.2"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#1ec8c8" stroke-width="3"/>
  
  <!-- Z letter stylized -->
  <g fill="#1ec8c8">
    <!-- Top bar of Z -->
    <rect x="60" y="60" width="80" height="10" rx="2"/>
    
    <!-- Diagonal of Z -->
    <rect x="60" y="95" width="80" height="10" rx="2" transform="rotate(-45 100 100)"/>
    
    <!-- Bottom bar of Z -->
    <rect x="60" y="130" width="80" height="10" rx="2"/>
  </g>
  
  <!-- Tech accent dots -->
  <circle cx="50" cy="50" r="3" fill="#1ec8c8" opacity="0.6"/>
  <circle cx="150" cy="50" r="3" fill="#1ec8c8" opacity="0.6"/>
  <circle cx="50" cy="150" r="3" fill="#1ec8c8" opacity="0.6"/>
  <circle cx="150" cy="150" r="3" fill="#1ec8c8" opacity="0.6"/>
  
  <!-- Orbital ring animation suggestion -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1ec8c8" stroke-width="1" opacity="0.15" stroke-dasharray="10 5"/>
</svg>
